name: 🧪 Comprehensive Testing Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: comprehensive-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  FORCE_COLOR: 1

jobs:
  setup:
    name: 🔧 Setup & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

  code-quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: ✨ Run Prettier
        run: npm run lint:prettier

      - name: 🔍 Run ESLint
        run: npm run lint:eslint

      - name: 📊 TypeScript compilation check
        run: npx tsc --noEmit

  unit-tests:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run unit tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 📈 Coverage summary
        run: |
          echo "## Coverage Summary 📊" >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            .total |
            "- **Lines**: \(.lines.pct)%",
            "- **Functions**: \(.functions.pct)%",
            "- **Branches**: \(.branches.pct)%",
            "- **Statements**: \(.statements.pct)%"
          ' coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"

  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔒 Run security tests
        run: npm run test:security

      - name: 🛡️ Run npm audit
        run: npm audit --audit-level=moderate

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  cross-platform:
    name: 🌍 Cross-Platform Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run core tests
        run: npm run test:unit

      - name: 💨 Run smoke tests
        run: npm run test:smoke

  integration-tests:
    name: 🔗 Integration & Compatibility Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔗 Run integration tests
        run: npm run test:integration

      - name: 🧪 Run compatibility tests
        run: tsx --test src/test/compatibility.test.ts

      - name: 🔁 Run focused integration coverage
        run: tsx --test src/test/integration.test.ts

  performance-tests:
    name: ⚡ Performance Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: ⚡ Run performance tests
        run: npm run test:performance

      - name: 📊 Performance benchmark summary
        run: echo "Performance tests completed successfully" >> "$GITHUB_STEP_SUMMARY"

  stress-tests:
    name: 💪 Stress & Memory Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 💪 Run stress tests
        run: npm run test:stress

      - name: 🧠 Run memory tests
        run: npm run test:memory

  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs:
      - setup
      - code-quality
      - unit-tests
      - security-tests
      - cross-platform
      - integration-tests
      - performance-tests
      - stress-tests
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "# 🧪 Comprehensive Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "## Test Job Results:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Setup: ${{ needs.setup.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security: ${{ needs.security-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cross-Platform: ${{ needs.cross-platform.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Integration: ${{ needs.integration-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Performance: ${{ needs.performance-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stress/Memory: ${{ needs.stress-tests.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Scope:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Quick PR validation stays in the dedicated PR workflow." >> "$GITHUB_STEP_SUMMARY"
          echo "- Cross-platform, integration, performance, and stress suites run on main, schedule, and manual dispatch." >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ All tests passed
        if: >-
          ${{
            needs.setup.result == 'success' &&
            needs.code-quality.result == 'success' &&
            needs.unit-tests.result == 'success' &&
            needs.security-tests.result == 'success' &&
            (needs.cross-platform.result == 'success' || needs.cross-platform.result == 'skipped') &&
            (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
            (needs.performance-tests.result == 'success' || needs.performance-tests.result == 'skipped') &&
            (needs.stress-tests.result == 'success' || needs.stress-tests.result == 'skipped')
          }}
        run: echo "🎉 All comprehensive tests passed!"

      - name: ❌ Some tests failed
        if: >-
          ${{
            needs.setup.result != 'success' ||
            needs.code-quality.result != 'success' ||
            needs.unit-tests.result != 'success' ||
            needs.security-tests.result != 'success' ||
            !contains(fromJSON('["success","skipped"]'), needs.cross-platform.result) ||
            !contains(fromJSON('["success","skipped"]'), needs.integration-tests.result) ||
            !contains(fromJSON('["success","skipped"]'), needs.performance-tests.result) ||
            !contains(fromJSON('["success","skipped"]'), needs.stress-tests.result)
          }}
        run: |
          echo "❌ Some tests failed. Check the job results above."
          exit 1
