name: 🧪 Comprehensive Testing Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: 20
  FORCE_COLOR: 1

jobs:
  # ===== SETUP & VALIDATION =====
  setup:
    name: 🔧 Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Generate cache key
        id: cache-key
        run: echo "key=node-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📋 Validate package.json
        run: npm audit --audit-level=moderate

  # ===== LINTING & CODE QUALITY =====
  code-quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: ✨ Run Prettier
        run: npm run lint:prettier

      - name: 🔍 Run ESLint
        run: npm run lint:eslint

      - name: 📊 TypeScript compilation check
        run: npx tsc --noEmit

  # ===== UNIT TESTS WITH COVERAGE =====
  unit-tests:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run unit tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 📈 Coverage summary
        run: |
          echo "## Coverage Summary 📊" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json | jq -r '
            .total | 
            "- **Lines**: \(.lines.pct)%",
            "- **Functions**: \(.functions.pct)%", 
            "- **Branches**: \(.branches.pct)%",
            "- **Statements**: \(.statements.pct)%"
          ' >> $GITHUB_STEP_SUMMARY

  # ===== SECURITY TESTS =====
  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔒 Run security tests
        run: npm run test:security

      - name: 🛡️ Run npm audit
        run: npm audit --audit-level=moderate

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # ===== CROSS-PLATFORM TESTING =====
  cross-platform:
    name: 🌍 Cross-Platform Tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 21]
        exclude:
          # Reduce CI load by excluding some combinations
          - os: windows-latest
            node-version: 18
          - os: macos-latest
            node-version: 18
    runs-on: ${{ matrix.os }}
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 💾 Cache test model
        uses: actions/cache@v4
        with:
          path: ~/.humanifyjs/models/
          key: models-phi-${{ runner.os }}

      - name: 📥 Download CI model
        run: npm run download-ci-model

      - name: 🧪 Run core tests
        run: npm run test:unit

      - name: 💨 Run smoke tests
        run: npm run test:smoke

  # ===== INTEGRATION & E2E TESTS =====
  integration-tests:
    name: 🔗 Integration & E2E Tests
    runs-on: macos-latest
    needs: setup
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 💾 Cache test model
        uses: actions/cache@v4
        with:
          path: ~/.humanifyjs/models/
          key: models-phi-${{ runner.os }}

      - name: 📥 Download CI model
        run: npm run download-ci-model

      - name: 🔗 Run integration tests
        run: npm run test:integration

      - name: 🧪 Run compatibility tests
        run: tsx --test src/test/compatibility.test.ts

      - name: 🔗 Run full integration suite
        run: tsx --test src/test/integration.test.ts

  # ===== PERFORMANCE TESTS =====
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 💾 Cache test model
        uses: actions/cache@v4
        with:
          path: ~/.humanifyjs/models/
          key: models-phi-${{ runner.os }}

      - name: 📥 Download CI model
        run: npm run download-ci-model

      - name: ⚡ Run performance tests
        run: npm run test:performance

      - name: 📊 Performance benchmark
        run: |
          echo "## Performance Results ⚡" >> $GITHUB_STEP_SUMMARY
          echo "Performance tests completed successfully" >> $GITHUB_STEP_SUMMARY

  # ===== MEMORY & STRESS TESTS =====
  stress-tests:
    name: 💪 Stress & Memory Tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 💾 Cache test model
        uses: actions/cache@v4
        with:
          path: ~/.humanifyjs/models/
          key: models-phi-${{ runner.os }}

      - name: 📥 Download CI model
        run: npm run download-ci-model

      - name: 💪 Run stress tests
        run: npm run test:stress

      - name: 🧠 Run memory tests
        run: npm run test:memory

  # ===== COMPREHENSIVE SUMMARY =====
  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [setup, code-quality, unit-tests, security-tests, cross-platform, integration-tests, performance-tests, stress-tests]
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "# 🧪 Comprehensive Test Results" >> $GITHUB_STEP_SUMMARY
          echo "## Test Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Setup: ${{ needs.setup.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-Platform: ${{ needs.cross-platform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Stress/Memory: ${{ needs.stress-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Statistics:" >> $GITHUB_STEP_SUMMARY
          echo "- Total test jobs: 8" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow run time: ~30-45 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms tested: Ubuntu, Windows, macOS" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js versions: 18, 20, 21" >> $GITHUB_STEP_SUMMARY

      - name: ✅ All tests passed
        if: ${{ needs.setup.result == 'success' && needs.code-quality.result == 'success' && needs.unit-tests.result == 'success' && needs.security-tests.result == 'success' && needs.cross-platform.result == 'success' && needs.integration-tests.result == 'success' && needs.performance-tests.result == 'success' && needs.stress-tests.result == 'success' }}
        run: echo "🎉 All comprehensive tests passed!"

      - name: ❌ Some tests failed
        if: ${{ needs.setup.result != 'success' || needs.code-quality.result != 'success' || needs.unit-tests.result != 'success' || needs.security-tests.result != 'success' || needs.cross-platform.result != 'success' || needs.integration-tests.result != 'success' || needs.performance-tests.result != 'success' || needs.stress-tests.result != 'success' }}
        run: |
          echo "❌ Some tests failed. Check the job results above."
          exit 1 