name: Manually run OpenAI tests

on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: openai-provider-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  test-openai:
    name: Run tests
    if: >-
      ${{
        contains(github.event.pull_request.labels.*.name, 'test-openai') &&
        !github.event.pull_request.head.repo.fork
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run test:openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
