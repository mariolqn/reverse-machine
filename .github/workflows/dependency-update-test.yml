name: 🔄 Dependency Update Testing

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-update-testing-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  test-latest-dependencies:
    name: 🆕 Test Latest Dependencies
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        update-type: [minor, patch]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📋 Backup dependency manifests
        run: |
          cp package.json package.json.backup
          cp package-lock.json package-lock.json.backup

      - name: 🔄 Update dependencies (${{ matrix.update-type }})
        run: |
          if [ "${{ matrix.update-type }}" = "minor" ]; then
            npx npm-check-updates -u --target minor
          else
            npx npm-check-updates -u --target patch
          fi

      - name: 🧹 Install updated dependencies
        run: npm install

      - name: 🏗️ Build with updated dependencies
        run: npm run build

      - name: 🧪 Run regression checks
        run: |
          npm run lint
          npm run test:minimal
          npm run test:smoke

      - name: 🔄 Restore dependency manifests
        if: always()
        run: |
          mv package.json.backup package.json
          mv package-lock.json.backup package-lock.json

  test-node-versions:
    name: 🏃 Test Supported Node Versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run basic regression checks
        run: |
          npm run lint
          npm run test:minimal

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: |
          npm audit --audit-level=moderate
          npx audit-ci --config audit-ci.json

      - name: 🔍 Check for known vulnerabilities
        run: npx better-npm-audit audit --level moderate

  dependency-report:
    name: 📊 Dependency Report
    runs-on: ubuntu-latest
    needs:
      - test-latest-dependencies
      - test-node-versions
      - security-audit
    if: always()
    steps:
      - name: 📊 Generate dependency report
        run: |
          echo "# 🔄 Dependency Update Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Date: $(date)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Test Results:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest Dependencies: ${{ needs.test-latest-dependencies.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Supported Node Versions: ${{ needs.test-node-versions.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> "$GITHUB_STEP_SUMMARY"
