name: 🔄 Dependency Update Testing

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  test-latest-dependencies:
    name: 🆕 Test Latest Dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        update-type: ['minor', 'patch']
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📋 Backup package.json
        run: cp package.json package.json.backup

      - name: 🔄 Update dependencies (${{ matrix.update-type }})
        run: |
          if [ "${{ matrix.update-type }}" == "minor" ]; then
            npx npm-check-updates -u --target minor
          else
            npx npm-check-updates -u --target patch
          fi

      - name: 🧹 Install updated dependencies
        run: npm install

      - name: 🏗️ Build with updated deps
        run: npm run build

      - name: 🧪 Run tests with updated deps
        run: |
          npm run test:unit
          npm run test:smoke

      - name: 🔄 Restore original package.json
        if: always()
        run: mv package.json.backup package.json

  test-node-versions:
    name: 🏃 Test Multiple Node Versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20, 21, 22]
    continue-on-error: true
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run basic tests
        run: npm run test:unit

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🧹 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: |
          npm audit --audit-level=low
          npx audit-ci --config audit-ci.json

      - name: 🔍 Check for known vulnerabilities
        run: |
          npx better-npm-audit audit --level moderate

  dependency-report:
    name: 📊 Dependency Report
    runs-on: ubuntu-latest
    needs: [test-latest-dependencies, test-node-versions, security-audit]
    if: always()
    steps:
      - name: 📊 Generate dependency report
        run: |
          echo "# 🔄 Dependency Update Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Latest Dependencies: ${{ needs.test-latest-dependencies.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node Versions: ${{ needs.test-node-versions.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY 